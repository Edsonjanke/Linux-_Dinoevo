;##############################################################################
; mb2hal config - AMS32 (clone Delta DVP-ES2) via Modbus ASCII
; Serial: /dev/ttyAMS32 (CH340, USB traseira fixa)
; Protocolo: ASCII, 9600, 7E1, Slave ID 1
;##############################################################################

[MB2HAL_INIT]
INIT_DEBUG=0
HAL_MODULE_NAME=ams32
TOTAL_TRANSACTIONS=7

;##############################################################################
; TRANSACTION 00 - Comandos LinuxCNC -> PLC (escrita coils M100-M107)
; M100=coolant, M101=spindle-on, M102=spindle-dir, M103=lube-on
; M104=reserva, M105=watchdog, M106=reserva, M107=reserva
;##############################################################################
[TRANSACTION_00]
LINK_TYPE=serial
SERIAL_PORT=/dev/ttyAMS32
SERIAL_BAUD=9600
SERIAL_BITS=7
SERIAL_PARITY=even
SERIAL_STOP=1
SERIAL_DELAY_MS=50
MB_SLAVE_ID=1
FIRST_ELEMENT=2148
NELEMENTS=8
MB_TX_CODE=fnct_15_write_multiple_coils
HAL_TX_NAME=cmd
MAX_UPDATE_RATE=50
DEBUG=0

;##############################################################################
; TRANSACTION 01 - Status PLC -> LinuxCNC (leitura coils M200-M215)
; M200-M203=jog X+/X-/Z+/Z-, M204=at-speed, M205=alarm-coolant
; M206=alarm-lube, M207=alarm-geral, M208=pos-valida
;##############################################################################
[TRANSACTION_01]
LINK_TYPE=serial
SERIAL_PORT=/dev/ttyAMS32
SERIAL_BAUD=9600
SERIAL_BITS=7
SERIAL_PARITY=even
SERIAL_STOP=1
MB_SLAVE_ID=1
FIRST_ELEMENT=2248
NELEMENTS=16
MB_TX_CODE=fnct_02_read_discrete_inputs
HAL_TX_NAME=status
MAX_UPDATE_RATE=50
DEBUG=0

;##############################################################################
; TRANSACTION 02 - Velocidade spindle (escrita registro D100)
;##############################################################################
[TRANSACTION_02]
LINK_TYPE=serial
SERIAL_PORT=/dev/ttyAMS32
SERIAL_BAUD=9600
SERIAL_BITS=7
SERIAL_PARITY=even
SERIAL_STOP=1
MB_SLAVE_ID=1
FIRST_ELEMENT=4196
NELEMENTS=1
MB_TX_CODE=fnct_06_write_single_register
HAL_TX_NAME=spindle-rpm
MAX_UPDATE_RATE=20
DEBUG=0

;##############################################################################
; TRANSACTION 03 - Config lubrificacao (leitura D110-D111)
; D110=tempo ON (seg), D111=intervalo (seg)
;##############################################################################
[TRANSACTION_03]
LINK_TYPE=serial
SERIAL_PORT=/dev/ttyAMS32
SERIAL_BAUD=9600
SERIAL_BITS=7
SERIAL_PARITY=even
SERIAL_STOP=1
MB_SLAVE_ID=1
FIRST_ELEMENT=4206
NELEMENTS=2
MB_TX_CODE=fnct_03_read_holding_registers
HAL_TX_NAME=lube-config
MAX_UPDATE_RATE=5
DEBUG=0

;##############################################################################
; TRANSACTION 04 - Salvar posicao X (escrita D2000-D2001, 32-bit latched)
;##############################################################################
[TRANSACTION_04]
LINK_TYPE=serial
SERIAL_PORT=/dev/ttyAMS32
SERIAL_BAUD=9600
SERIAL_BITS=7
SERIAL_PARITY=even
SERIAL_STOP=1
MB_SLAVE_ID=1
FIRST_ELEMENT=6096
NELEMENTS=2
MB_TX_CODE=fnct_16_write_multiple_registers
HAL_TX_NAME=pos-x
MAX_UPDATE_RATE=2
DEBUG=0

;##############################################################################
; TRANSACTION 05 - Salvar posicao Z (escrita D2002-D2003, 32-bit latched)
;##############################################################################
[TRANSACTION_05]
LINK_TYPE=serial
SERIAL_PORT=/dev/ttyAMS32
SERIAL_BAUD=9600
SERIAL_BITS=7
SERIAL_PARITY=even
SERIAL_STOP=1
MB_SLAVE_ID=1
FIRST_ELEMENT=6098
NELEMENTS=2
MB_TX_CODE=fnct_16_write_multiple_registers
HAL_TX_NAME=pos-z
MAX_UPDATE_RATE=2
DEBUG=0

;##############################################################################
; TRANSACTION 06 - Flag posicao valida (escrita D2004)
;##############################################################################
[TRANSACTION_06]
LINK_TYPE=serial
SERIAL_PORT=/dev/ttyAMS32
SERIAL_BAUD=9600
SERIAL_BITS=7
SERIAL_PARITY=even
SERIAL_STOP=1
MB_SLAVE_ID=1
FIRST_ELEMENT=6100
NELEMENTS=1
MB_TX_CODE=fnct_06_write_single_register
HAL_TX_NAME=pos-flag
MAX_UPDATE_RATE=2
DEBUG=0
