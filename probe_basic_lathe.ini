[EMC]
VERSION = 1.1
MACHINE = QtPyVCP - probe_basic Sim
DEBUG = 0

[DISPLAY]
DISPLAY = probe_basic_lathe
BACK_TOOL_LATHE = 1
MASTER_TOOL_OFFSET_MODE = true
CONFIRM_EXIT = False
LOG_FILE = sim.log
LOG_LEVEL = INFO
PREFERENCE_FILE = sim.pref
CONFIG_FILE = custom_config.yml
CYCLE_TIME = 0.100
POSITION_OFFSET = RELATIVE
POSITION_FEEDBACK = ACTUAL
DEFAULT_LINEAR_VELOCITY = 6.000000
MAX_LINEAR_VELOCITY = 45.000000
MIN_LINEAR_VELOCITY = 0.500000
DEFAULT_ANGULAR_VELOCITY = 12.000000
MAX_ANGULAR_VELOCITY = 180.000000
MIN_ANGULAR_VELOCITY = 1.666667
DEFAULT_SPINDLE_SPEED = 300
MAX_SPINDLE_OVERRIDE = 2.000000
MIN_SPINDLE_OVERRIDE = 0.500000
MAX_FEED_OVERRIDE = 2.000000
PROGRAM_PREFIX = ~/linuxcnc/nc_files
OPEN_FILE = ~/linuxcnc/nc_files/pb_examples/blank.ngc
INTRO_GRAPHIC = pbsplash.png
INTRO_TIME = 3
INCREMENTS = 5mm 1mm .5mm .1mm .05mm .01mm .005mm
# USER_TABS_PATH = user_tabs/
USER_BUTTONS_PATH = user_buttons/
USER_DROS_PATH = user_dro_display/
DRO_DISPLAY = XZ
GEOMETRY = XZ
OFFSET_COLUMNS = XZ
TOOL_TABLE_COLUMNS = TXZIJDQR
KEYBOARD_JOG = true
KEYBOARD_JOG_SAFETY_OFF = false

[FILTER]
PROGRAM_EXTENSION = .nc,.txt,.tap Other NC files

[RS274NGC]
RS274NGC_STARTUP_CODE = G21 G40 G90 G94 G97 G64 P0.025
PARAMETER_FILE = linuxcnc.var
SUBROUTINE_PATH = subroutines
ON_ABORT_COMMAND = O<on_abort> CALL

[EMCMOT]
EMCMOT = motmod
COMM_TIMEOUT = 1.0
BASE_PERIOD = 100000
SERVO_PERIOD = 1000000

[TASK]
TASK = milltask
CYCLE_TIME = 0.010

[HAL]
HALFILE = hallib/core_sim_2.hal
HALFILE = hallib/simulated_home_xz.hal
HALFILE = hallib/simulated_lathe.hal
HALUI = halui
POSTGUI_HALFILE = hallib/probe_basic_lathe_postgui.hal

[HALUI]

[TRAJ]
AXES = 2
SPINDLES = 1
COORDINATES = X Z
LINEAR_UNITS = mm
ANGULAR_UNITS = degree
CYCLE_TIME = 0.010
DEFAULT_VELOCITY = 8.00
MAX_LINEAR_VELOCITY = 135.00
DEFAULT_ACCELERATION = 20.0
MAX_ACCELERATION = 20.0
NO_FORCE_HOMING = 0
# Axes sections ---------------------------------------------------------------

# First axis
[EMCIO]
EMCIO = io
CYCLE_TIME = 0.100
TOOL_TABLE = tool.tbl
#TOOL_CHANGE_POSITION = 2 0 1
#TOOL_CHANGE_WITH_SPINDLE_ON = 1

[KINS]
KINEMATICS = trivkins coordinates=xz
JOINTS = 2

[AXIS_X]
MIN_LIMIT = -600.0
MAX_LIMIT = 600.0
MAX_VELOCITY = 75.0
MAX_ACCELERATION = 2250.0

[JOINT_0]
TYPE =  LINEAR
HOME =  0.000
MAX_VELOCITY = 75.0
MAX_ACCELERATION = 2250.0
BACKLASH = 0.000
INPUT_SCALE = 4000
OUTPUT_SCALE = 1.000
MIN_LIMIT = -600.0
MAX_LIMIT = 600.0
FERROR = 10.0
MIN_FERROR = 1.0
HOME_OFFSET = 0.0
HOME_SEARCH_VEL = 0.0
HOME_LATCH_VEL = 0.0
HOME_USE_INDEX = NO
HOME_IGNORE_LIMITS = NO
HOME_SEQUENCE = 2
HOME_IS_SHARED = 1

[AXIS_Z]
MIN_LIMIT = -1000.0
MAX_LIMIT = 1000.0
MAX_VELOCITY = 72.0
MAX_ACCELERATION = 1350.0

[JOINT_1]
TYPE = LINEAR
HOME = 0.0
MAX_VELOCITY = 72.0
MAX_ACCELERATION = 1350.0
BACKLASH = 0.000
INPUT_SCALE = 4000
OUTPUT_SCALE = 1.000
MIN_LIMIT = -1000.0
MAX_LIMIT = 1000.0
FERROR = 10.0
MIN_FERROR = 1.0
HOME_OFFSET = 0.0
HOME_SEARCH_VEL = 0.0
HOME_LATCH_VEL = 0.0
HOME_USE_INDEX = NO
HOME_IGNORE_LIMITS = NO
HOME_SEQUENCE = 1
HOME_IS_SHARED = 1

[SPINDLE_0]
P = 0
I = 0
D = 0
FF0 = 1
FF1 = 0
FF2 = 0
BIAS = 0
DEADBAND = 0
MAX_OUTPUT = 2000
